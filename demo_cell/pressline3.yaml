# =============================================================================
# Add-On Instructions (device function blocks)
# =============================================================================
aois:
  - name: FB_VALVE
    revision: "1.1"
    description: Dual-solenoid valve control with open/close feedback and timeout fault.
    parameters:
      - {name: EnableIn, data_type: BOOL, usage: Input,  required: true,  visible: false, default_data: "1", description: AOI enable input}
      - {name: Open,     data_type: BOOL, usage: Input,  required: true,  visible: true,  description: Command valve open}
      - {name: Close,    data_type: BOOL, usage: Input,  required: true,  visible: true,  description: Command valve close}
      - {name: Opened,   data_type: BOOL, usage: Input,  required: true,  visible: true,  description: Open limit switch feedback}
      - {name: Closed,   data_type: BOOL, usage: Input,  required: true,  visible: true,  description: Closed limit switch feedback}
      - {name: CmdOpen,  data_type: BOOL, usage: Output, required: true,  visible: true,  description: Energize open solenoid}
      - {name: CmdClose, data_type: BOOL, usage: Output, required: true,  visible: true,  description: Energize close solenoid}
      - {name: Fault,    data_type: BOOL, usage: Output, required: true,  visible: true,  description: Valve failed to reach commanded position}
      - {name: EnableOut,data_type: BOOL, usage: Output, required: false, visible: false, description: AOI enable output}
    local_tags:
      - {name: MoveTmr, data_type: TIMER, description: Valve travel timeout timer}
    routines:
      - name: Logic
        type: RLL
        rungs:
          - {comment: "Command open when requested and not commanded closed", text: "XIC(EnableIn)XIC(Open)XIO(Close)OTE(CmdOpen);"}
          - {comment: "Command close when requested and not commanded open",  text: "XIC(EnableIn)XIC(Close)XIO(Open)OTE(CmdClose);"}
          - {comment: "Run travel timeout while commanded but not confirmed",  text: "[XIC(CmdOpen)XIO(Opened),XIC(CmdClose)XIO(Closed)]TON(MoveTmr,?,?);"}
          - {comment: "Latch fault on travel timeout", text: "XIC(MoveTmr.DN)OTL(Fault);"}
          - {comment: "Clear fault once a limit is confirmed", text: "[XIC(Opened),XIC(Closed)]OTU(Fault);"}
          - {text: "XIC(EnableIn)OTE(EnableOut);"}

  - name: FB_MOTOR_STARTER
    revision: "1.2"
    description: Across-the-line motor starter with 3-wire seal-in and run-feedback fault.
    parameters:
      - {name: EnableIn, data_type: BOOL, usage: Input,  required: true,  visible: false, default_data: "1", description: AOI enable input}
      - {name: Start,    data_type: BOOL, usage: Input,  required: true,  visible: true,  description: Momentary start request}
      - {name: Stop,     data_type: BOOL, usage: Input,  required: true,  visible: true,  description: Stop request (normally closed)}
      - {name: Running,  data_type: BOOL, usage: Input,  required: true,  visible: true,  description: Motor running feedback (aux contact)}
      - {name: Run,      data_type: BOOL, usage: Output, required: true,  visible: true,  description: Contactor run output}
      - {name: Fault,    data_type: BOOL, usage: Output, required: true,  visible: true,  description: Motor failed to confirm running}
      - {name: EnableOut,data_type: BOOL, usage: Output, required: false, visible: false, description: AOI enable output}
    local_tags:
      - {name: FaultTmr, data_type: TIMER, description: Run-feedback timeout timer}
    routines:
      - name: Logic
        type: RLL
        rungs:
          - {comment: "3-wire seal-in start/stop with fault drop-out", text: "XIC(EnableIn)[XIC(Start),XIC(Run)]XIC(Stop)XIO(Fault)OTE(Run);"}
          - {comment: "Run feedback timeout", text: "XIC(Run)XIO(Running)TON(FaultTmr,?,?);"}
          - {comment: "Latch motor fault", text: "XIC(FaultTmr.DN)OTL(Fault);"}
          - {comment: "Fault clears when stopped", text: "XIO(Stop)OTU(Fault);"}
          - {text: "XIC(EnableIn)OTE(EnableOut);"}

  - name: FB_CYLINDER
    revision: "1.0"
    description: Double-acting pneumatic cylinder with extend/retract limits and motion timeout.
    parameters:
      - {name: EnableIn,  data_type: BOOL, usage: Input,  required: true,  visible: false, default_data: "1", description: AOI enable input}
      - {name: Extend,    data_type: BOOL, usage: Input,  required: true,  visible: true,  description: Command cylinder extend}
      - {name: Retract,   data_type: BOOL, usage: Input,  required: true,  visible: true,  description: Command cylinder retract}
      - {name: Extended,  data_type: BOOL, usage: Input,  required: true,  visible: true,  description: Extended limit switch}
      - {name: Retracted, data_type: BOOL, usage: Input,  required: true,  visible: true,  description: Retracted limit switch}
      - {name: CmdExtend, data_type: BOOL, usage: Output, required: true,  visible: true,  description: Energize extend solenoid}
      - {name: CmdRetract,data_type: BOOL, usage: Output, required: true,  visible: true,  description: Energize retract solenoid}
      - {name: Fault,     data_type: BOOL, usage: Output, required: true,  visible: true,  description: Cylinder motion timeout}
      - {name: EnableOut, data_type: BOOL, usage: Output, required: false, visible: false, description: AOI enable output}
    local_tags:
      - {name: MoveTmr, data_type: TIMER, description: Motion timeout timer}
    routines:
      - name: Logic
        type: RLL
        rungs:
          - {comment: "Extend command", text: "XIC(EnableIn)XIC(Extend)XIO(Retract)XIO(Extended)OTE(CmdExtend);"}
          - {comment: "Retract command", text: "XIC(EnableIn)XIC(Retract)XIO(Extend)XIO(Retracted)OTE(CmdRetract);"}
          - {comment: "Motion timeout while moving", text: "[XIC(CmdExtend),XIC(CmdRetract)]TON(MoveTmr,?,?);"}
          - {comment: "Latch fault if neither limit made in time", text: "XIC(MoveTmr.DN)XIO(Extended)XIO(Retracted)OTL(Fault);"}
          - {comment: "Clear fault when a limit is reached", text: "[XIC(Extended),XIC(Retracted)]OTU(Fault);"}
          - {text: "XIC(EnableIn)OTE(EnableOut);"}

  - name: FB_DEBOUNCE
    revision: "1.0"
    description: On-delay debounce for a noisy discrete input (photo-eye / limit switch).
    parameters:
      - {name: EnableIn, data_type: BOOL, usage: Input,  required: true,  visible: false, default_data: "1", description: AOI enable input}
      - {name: Input,    data_type: BOOL, usage: Input,  required: true,  visible: true,  description: Raw discrete input}
      - {name: DebTime,  data_type: DINT, usage: Input,  required: true,  visible: true,  description: Debounce time (ms)}
      - {name: Output,   data_type: BOOL, usage: Output, required: true,  visible: true,  description: Debounced output}
      - {name: EnableOut,data_type: BOOL, usage: Output, required: false, visible: false, description: AOI enable output}
    local_tags:
      - {name: DbTmr, data_type: TIMER, description: Debounce timer}
    routines:
      - name: Logic
        type: RLL
        rungs:
          - {comment: "On-delay the raw input", text: "XIC(EnableIn)XIC(Input)TON(DbTmr,?,?);"}
          - {comment: "Publish debounced state", text: "XIC(DbTmr.DN)OTE(Output);"}
          - {text: "XIC(EnableIn)OTE(EnableOut);"}

