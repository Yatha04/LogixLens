  - {name: Hyd_Pump_Running, data_type: BOOL, tag_type: Alias, alias_for: "DI_Press:1:I.Data.6", description: Hydraulic pump running feedback}
  - {name: Hyd_LowPressure,  data_type: BOOL, description: Hydraulic pressure below low limit}
  - {name: Press_Overtemp,   data_type: BOOL, tag_type: Alias, alias_for: "DI_Press:1:I.Data.7", description: Hydraulic oil over-temperature switch}
  - {name: Press_Tonnage,    data_type: REAL, description: Measured press tonnage (tons)}
  - {name: Lube_OK,          data_type: BOOL, description: Lubrication system healthy}
  - {name: Lube_Cycle_Req,   data_type: BOOL, description: Lube cycle requested}
  - {name: Lube_Done,        data_type: BOOL, description: Lube cycle complete}
  - {name: Fault_Lube,       data_type: BOOL}
  - {name: T_PressDwell,     data_type: TIMER, description: Press dwell-at-bottom timer}
  - {name: T_LubeCycle,      data_type: TIMER, description: Lube cycle timer}
  - {name: Fault_PressOvertemp, data_type: BOOL, description: "LATCHED: hydraulic over-temperature"}
  - {name: Fault_HydLowPressure,data_type: BOOL, description: "LATCHED: hydraulic low pressure during cycle"}
  - {name: Alarm_PressOvertemp, data_type: ALARM_TYPE, description: Press over-temp alarm record}
  - {name: Alarm_HydLowPressure,data_type: ALARM_TYPE}
  - {name: Station_Press,    data_type: udtStation, description: Press station status}
  - {name: Recipe,           data_type: udtRecipe, description: Active press recipe parameters}
  - {name: Recipe_Number,    data_type: DINT, description: Selected recipe number (from HMI)}
  - {name: Press_Ready,      data_type: BOOL}

  # --- Outfeed (P400) -----------------------------------------------------
  - {name: Motor_Outfeed,    data_type: FB_MOTOR_STARTER, description: Outfeed conveyor motor starter}
  - {name: Outfeed_Start_Cmd,data_type: BOOL, description: Outfeed conveyor start request}
  - {name: Outfeed_Stop_Cmd, data_type: BOOL, description: Outfeed conveyor stop request}
  - {name: Outfeed_Run_Cmd,  data_type: BOOL, tag_type: Alias, alias_for: "DO_Main:1:O.Data.9", description: Outfeed conveyor contactor output}
  - {name: Outfeed_Running,  data_type: BOOL, tag_type: Alias, alias_for: "Local:1:I.Data.18"}
  - {name: Motor_Outfeed_Fault, data_type: BOOL, description: Outfeed motor starter fault}
  - {name: Cyl_RejectGate,   data_type: FB_CYLINDER, description: Reject gate diverter cylinder}
  - {name: Gate_Extend_Cmd,  data_type: BOOL, description: Reject gate divert command}
  - {name: Gate_Retract_Cmd, data_type: BOOL, description: Reject gate home command}
  - {name: Gate_Ext_Out,     data_type: BOOL, tag_type: Alias, alias_for: "DO_Main:1:O.Data.10"}
  - {name: Gate_Ret_Out,     data_type: BOOL, tag_type: Alias, alias_for: "DO_Main:1:O.Data.11"}
  - {name: Gate_Fault,       data_type: BOOL}
  - {name: Reject_Gate_Open, data_type: BOOL, tag_type: Alias, alias_for: "Local:1:I.Data.19", description: Reject gate extended (diverting) limit}
  - {name: Reject_Gate_Home, data_type: BOOL, tag_type: Alias, alias_for: "Local:1:I.Data.20"}
  - {name: Part_At_Outfeed,  data_type: BOOL, tag_type: Alias, alias_for: "Local:1:I.Data.21", description: Part present at outfeed photo-eye}
  - {name: Part_Reject,      data_type: BOOL, description: Current part flagged for reject}
  - {name: Quality_Fail,     data_type: BOOL, description: Quality check failed for current part}
  - {name: C_PartCount,      data_type: COUNTER, description: Good part production counter}
  - {name: C_RejectCount,    data_type: COUNTER, description: Reject part counter}
  - {name: Good_Part_Total,  data_type: DINT, description: Good parts produced this shift}
  - {name: Station_Outfeed,  data_type: udtStation, description: Outfeed station status}
  - {name: Drive_Ready,      data_type: BOOL, tag_type: Alias, alias_for: "Local:1:I.Data.22", description: PowerFlex drive ready}
  - {name: Drive_Fault_In,   data_type: BOOL, tag_type: Alias, alias_for: "Local:1:I.Data.23"}
  - {name: Drive_Speed_Ref,  data_type: REAL, description: Outfeed drive speed reference (Hz)}
  - {name: Fault_DriveFault, data_type: BOOL, description: "LATCHED: outfeed drive fault"}
  - {name: Alarm_DriveFault, data_type: ALARM_TYPE}
  - {name: Outfeed_Ready,    data_type: BOOL}

  # --- Spare / commissioning tags (undocumented on purpose) ---------------
  - {name: Spare_BOOL_01, data_type: BOOL}
  - {name: Spare_BOOL_02, data_type: BOOL}
  - {name: Spare_BOOL_03, data_type: BOOL}
  - {name: Spare_DINT_01, data_type: DINT}
  - {name: Spare_DINT_02, data_type: DINT}
  - {name: Spare_REAL_01, data_type: REAL}
  - {name: Test_Override, data_type: BOOL}
  - {name: Maint_Mode,    data_type: BOOL}

  # --- Program-scoped working tags ---------------------------------------
  - {name: Seq_Step,       data_type: DINT, scope: P200_Transfer, description: Transfer arm sequencer step}
  - {name: Seq_StepTimer,  data_type: TIMER, scope: P200_Transfer, description: Per-step watchdog timer}
  - {name: Seq_FirstScan,  data_type: BOOL, scope: P200_Transfer}
  - {name: Pick_ONS,       data_type: BOOL, scope: P200_Transfer}
  - {name: Local_Fault,    data_type: BOOL, scope: P200_Transfer}
  - {name: Press_Step,     data_type: DINT, scope: P300_Press, description: Press cycle step register}
  - {name: Dwell_Done,     data_type: BOOL, scope: P300_Press}
  - {name: Stroke_ONS,     data_type: BOOL, scope: P300_Press}
  - {name: Recipe_Scratch, data_type: REAL, scope: P300_Press}
  - {name: Reject_ONS,     data_type: BOOL, scope: P400_Outfeed}
  - {name: Count_ONS,      data_type: BOOL, scope: P400_Outfeed}
  - {name: Outfeed_Local,  data_type: BOOL, scope: P400_Outfeed}
  - {name: Estop_ONS,      data_type: BOOL, scope: P900_Safety}
  - {name: Reset_ONS,      data_type: BOOL, scope: P900_Safety}
  - {name: Main_Scratch,   data_type: DINT, scope: MainProgram}

# =============================================================================
# Interlocks (compiled to ladder by generate_l5x.py)
#   These two form the money-shot chain:
#     Press_Cycle_Start --(reads Safety_OK)--> Safety_OK --(reads GuardDoor_Closed)-->
#     GuardDoor_Closed  (a physical safety input alias)
# =============================================================================
interlocks:
  Press_Cycle_Start:
    output: Press_Cycle_Start
    program: P300_Press
    routine: R30_PressCycle
    comment: >-
      PRESS CYCLE START PERMISSIVE -- every condition must be satisfied before the
      press will stroke. Auto mode + part staged + transfer clear + press at top +
      hydraulics OK + clamp closed + lube OK + master Safety_OK, initiated by the
      cycle-start PB or the auto sequencer, with no active cycle fault.
    all_of:
      - Mode_Auto
      - Cycle_Active
      - Part_Present
      - Transfer_Clear
      - Press_At_Top
      - Hydraulics_OK
      - Clamp_Closed
      - Lube_OK
      - Safety_OK
    any_of:
      - Cycle_Start_PB
      - Auto_Sequence_Run
    none_of:
      - Press_Cycle_Fault

  Safety_OK:
    output: Safety_OK
    program: P900_Safety
    routine: R92_SafetyOK
    comment: >-
      MASTER SAFETY OK -- dual-channel E-stop chain healthy, guard door closed,
      light curtain clear, safety relay both channels confirmed, and the safety
      circuit reset completed. Feeds every station's run permissive.
    all_of:
      - Estop_Chain_OK
      - GuardDoor_Closed
      - LightCurtain_Clear
      - SafetyRelay_CH1
      - SafetyRelay_CH2
      - Safety_Reset_Done

# =============================================================================
# Programs & routines (explicit ladder / structured text)
# =============================================================================
programs:
  # ---------------------------------------------------------------- MainProgram
  - name: MainProgram
    main_routine: MainRoutine
    routines:
      - name: MainRoutine
        type: RLL
        description: Cell mode logic, master seal-in, and dispatch to station logic.
        rungs:
          - {comment: "Dispatch mode + cycle control logic", text: "JSR(R01_ModeLogic,0);"}
          - {text: "JSR(R02_CycleControl,0);"}
          - {comment: "1 Hz heartbeat to the HMI watchdog", text: "XIC(Heartbeat_1s)ADD(HMI_Heartbeat,1,HMI_Heartbeat);"}
      - name: R01_ModeLogic
        type: RLL
        description: Auto/Manual mode selection (interlocked, mutually exclusive).
        rungs:
          - {comment: "Auto mode -- selectable only when not in manual", text: "XIC(HMI_Auto_Req)XIO(HMI_Manual_Req)XIO(Estop_Active)OTE(Mode_Auto);"}
          - {comment: "Manual mode", text: "XIC(HMI_Manual_Req)XIO(HMI_Auto_Req)OTE(Mode_Manual);"}
          - {comment: "Reset one-shot", text: "XIC(Reset_PB)ONS(ONS_Reset)OTE(Main_Scratch.0);"}
      - name: R02_CycleControl
        type: RLL
        description: Master start/stop seal-in and automatic cycle latch.
        rungs:
          - {comment: "Master seal-in: start latches System_Running, sealed by itself, dropped by stop or loss of safety", text: "[XIC(Master_Start_PB),XIC(System_Running)]XIC(Master_Stop_PB)XIC(Safety_OK)OTE(System_Running);"}
          - {comment: "Latch automatic cycle on cycle-start PB in auto mode", text: "XIC(System_Running)XIC(Mode_Auto)XIC(Cycle_Start_PB)ONS(ONS_CycleStart)OTL(Cycle_Active);"}
          - {comment: "Unlatch cycle on stop, loss of run, or loss of safety", text: "[XIC(Cycle_Stop_PB),XIO(System_Running),XIO(Safety_OK)]OTU(Cycle_Active);"}
          - {text: "XIC(Cycle_Active)OTE(Station_Press.CycleActive);"}

  # ---------------------------------------------------------------- P100_Infeed
  - name: P100_Infeed
    main_routine: MainRoutine
    routines:
      - name: MainRoutine
        type: RLL
        rungs:
          - {text: "JSR(R11_PartDetect,0);"}
          - {text: "JSR(R10_InfeedConveyor,0);"}
      - name: R10_InfeedConveyor
        type: RLL
        description: Infeed conveyor motor starter and jam detection.
        rungs:
          - {comment: "Run infeed in auto when running and no jam", text: "XIC(System_Running)XIC(Mode_Auto)XIO(Fault_InfeedJam)XIO(Part_Present)OTE(Infeed_Start_Cmd);"}
          - {text: "XIC(Cycle_Stop_PB)OTE(Infeed_Stop_Cmd);"}
          - {comment: "Infeed conveyor starter AOI", text: "FB_MOTOR_STARTER(Motor_Infeed,Infeed_Start_Cmd,Infeed_Stop_Cmd,Infeed_Running,Infeed_Run_Cmd,Motor_Infeed_Fault);"}
          - {comment: "Jam detect: part sits under eye too long", text: "XIC(Part_Present)XIC(Infeed_Run_Cmd)TON(T_InfeedJam,?,?);"}
          - {text: "XIC(T_InfeedJam.DN)OTE(Infeed_Jam_Detected);"}
          - {comment: "Latch infeed jam fault", text: "XIC(Infeed_Jam_Detected)OTL(Fault_InfeedJam);"}
          - {comment: "Reset infeed jam fault", text: "XIC(Reset_PB)OTU(Fault_InfeedJam);"}
          - {text: "XIC(Fault_InfeedJam)OTE(Station_Infeed.Fault);"}
      - name: R11_PartDetect
        type: RLL
        description: Debounced part-present detection at the infeed.
        rungs:
          - {comment: "Debounce the leading photo-eye", text: "FB_DEBOUNCE(Debounce_PartEye,PartPresent_Eye1,50,Part_Present);"}
          - {comment: "Either eye seen confirms a staged part", text: "[XIC(Part_Present),XIC(PartPresent_Eye2)]OTE(Station_Infeed.Ready);"}
          - {text: "XIC(Station_Infeed.Ready)XIO(Fault_InfeedJam)OTE(Infeed_Ready);"}

  # ---------------------------------------------------------------- P200_Transfer
  - name: P200_Transfer
    main_routine: MainRoutine
    routines:
      - name: MainRoutine
        type: RLL
        rungs:
          - {text: "JSR(R21_Sequence,0);"}
          - {text: "JSR(R20_TransferArm,0);"}
      - name: R20_TransferArm
        type: RLL
        description: Transfer arm cylinder and vacuum gripper control.
        rungs:
          - {comment: "Transfer arm cylinder AOI", text: "FB_CYLINDER(Cyl_TransferArm,Arm_Extend_Cmd,Arm_Retract_Cmd,TransferArm_Extended,TransferArm_Retracted,Arm_Ext_Out,Arm_Ret_Out,Arm_Fault);"}
          - {comment: "Grip while extended and picking", text: "XIC(TransferArm_Extended)XIC(Pick_Complete)XIO(Place_Complete)OTE(Vac_Gripper_Cmd);"}
          - {comment: "Transfer clear when fully retracted and no cyl fault", text: "XIC(TransferArm_Retracted)XIO(Arm_Fault)OTE(Transfer_Clear);"}
          - {comment: "Motion timeout arms the transfer fault", text: "[XIC(Arm_Extend_Cmd),XIC(Arm_Retract_Cmd)]TON(T_TransferTimeout,?,?);"}
          - {text: "XIC(T_TransferTimeout.DN)OTE(Transfer_Timeout);"}
          - {comment: "Latch transfer timeout fault", text: "XIC(Transfer_Timeout)OTL(Fault_TransferTimeout);"}
          - {comment: "Reset transfer fault", text: "XIC(Reset_PB)OTU(Fault_TransferTimeout);"}
      - name: R21_Sequence
        type: RLL
        description: Pick/place step sequencer (integer Step register + EQU comparisons).
        rungs:
          - {comment: "Initialize sequencer to step 0 on first scan / reset", text: "[XIC(Seq_FirstScan),XIC(Reset_PB)]MOV(0,Seq_Step);"}
          - {text: "OTL(Seq_FirstScan);"}
          - {comment: "Step 0 -> 10: begin pick when a part is staged and clear", text: "EQU(Seq_Step,0)XIC(Infeed_Ready)XIC(Transfer_Clear)XIC(Cycle_Active)MOV(10,Seq_Step);"}
          - {comment: "Step 10: extend to pick", text: "EQU(Seq_Step,10)OTE(Arm_Extend_Cmd);"}
          - {comment: "Step 10 -> 20: extended, grip complete", text: "EQU(Seq_Step,10)XIC(TransferArm_Extended)XIC(Vac_OK)MOV(20,Seq_Step);"}
          - {text: "EQU(Seq_Step,20)XIC(Vac_OK)ONS(Pick_ONS)OTE(Pick_Complete);"}
          - {comment: "Step 20 -> 30: retract with part", text: "EQU(Seq_Step,20)XIC(Pick_Complete)MOV(30,Seq_Step);"}
          - {comment: "Step 30: retract to place", text: "EQU(Seq_Step,30)OTE(Arm_Retract_Cmd);"}
          - {comment: "Step 30 -> 0: placed and homed, request press stroke", text: "EQU(Seq_Step,30)XIC(TransferArm_Retracted)MOV(0,Seq_Step);"}
          - {text: "EQU(Seq_Step,30)XIC(TransferArm_Retracted)OTE(Place_Complete);"}
          - {comment: "Auto sequencer requests a stroke once the arm is clear", text: "XIC(Place_Complete)XIC(Transfer_Clear)OTE(Auto_Sequence_Run);"}
          - {text: "GRT(Seq_Step,0)OTE(Station_Transfer.CycleActive);"}

  # ---------------------------------------------------------------- P300_Press
  - name: P300_Press
    main_routine: MainRoutine
    routines:
      - name: MainRoutine
        type: RLL
        rungs:
          - {text: "JSR(R32_Recipe,0);"}
          - {text: "JSR(R31_Hydraulics,0);"}
          - {comment: "R30 contains the press-cycle-start permissive (money shot)", text: "JSR(R30_PressCycle,0);"}
      - name: R30_PressCycle
        type: RLL
        description: Press stroke sequence gated by the cycle-start permissive.
        rungs:
          - {comment: "Ram advance cylinder AOI", text: "FB_CYLINDER(Cyl_PressRam,Ram_Extend_Cmd,Ram_Retract_Cmd,Press_At_Bottom,Press_At_Top,Ram_Ext_Out,Ram_Ret_Out,Ram_Fault);"}
          - {comment: "Advance ram on a validated cycle start", text: "XIC(Press_Cycle_Start)ONS(Stroke_ONS)OTL(Press_Cycle_Active);"}
          - {text: "XIC(Press_Cycle_Active)XIO(Press_At_Bottom)OTE(Ram_Extend_Cmd);"}
          - {comment: "Dwell at bottom for the recipe time", text: "XIC(Press_At_Bottom)TON(T_PressDwell,?,?);"}
          - {text: "XIC(T_PressDwell.DN)OTE(Dwell_Done);"}
          - {comment: "Return ram after dwell", text: "XIC(Dwell_Done)OTE(Ram_Retract_Cmd);"}
          - {comment: "End cycle when returned to top", text: "XIC(Press_At_Top)XIC(Dwell_Done)OTU(Press_Cycle_Active);"}
          - {comment: "Cycle fault if ram faults or overtemp latched", text: "[XIC(Ram_Fault),XIC(Fault_PressOvertemp),XIC(Fault_HydLowPressure)]OTE(Press_Cycle_Fault);"}
          - {text: "XIC(Press_Cycle_Active)OTE(Station_Press.CycleActive);"}
          # (the Press_Cycle_Start permissive rung is appended here from interlocks:)
      - name: R31_Hydraulics
        type: RLL
        description: Hydraulic power unit, clamp/lube valves, pressure supervision (GRT/LES).
        rungs:
          - {comment: "Run the hydraulic pump in auto", text: "XIC(System_Running)XIC(Mode_Auto)XIO(Fault_PressOvertemp)OTE(Hyd_Pump_Run);"}
          - {comment: "Clamp valve AOI", text: "FB_VALVE(Valve_PressClamp,Clamp_Open_Cmd,Clamp_Close_Cmd,Clamp_Opened,Clamp_Closed_LS,Clamp_Open_Out,Clamp_Close_Out,Valve_Clamp_Fault);"}
          - {comment: "Lube valve AOI", text: "FB_VALVE(Valve_Lube,Lube_Open_Cmd,Lube_Close_Cmd,Lube_Opened,Lube_Closed,Lube_Open_Out,Lube_Close_Out,Lube_Valve_Fault);"}
          - {comment: "Close clamp before stroke", text: "XIC(Press_Cycle_Active)XIO(Transfer_Clear)OTE(Clamp_Close_Cmd);"}
          - {text: "XIC(Clamp_Closed_LS)XIO(Valve_Clamp_Fault)OTE(Clamp_Closed);"}
          - {comment: "Hydraulics OK: pump running and pressure within band, no overtemp", text: "XIC(Hyd_Pump_Running)GRT(Hyd_Pressure,Hyd_Pressure_LowLimit)LES(Hyd_Pressure,Hyd_Pressure_HighLimit)XIO(Fault_PressOvertemp)OTE(Hydraulics_OK);"}
          - {comment: "Low pressure detection", text: "XIC(Hyd_Pump_Running)LES(Hyd_Pressure,Hyd_Pressure_LowLimit)OTE(Hyd_LowPressure);"}
          - {comment: "Latch low-pressure fault only while pumping", text: "XIC(Hyd_LowPressure)XIC(Hyd_Pump_Run)OTL(Fault_HydLowPressure);"}
          - {text: "XIC(Reset_PB)OTU(Fault_HydLowPressure);"}
          - {comment: "Over-temp latch/reset pair", text: "XIC(Press_Overtemp)OTL(Fault_PressOvertemp);"}
          - {text: "XIC(Reset_PB)XIO(Press_Overtemp)OTU(Fault_PressOvertemp);"}
          - {comment: "Lube OK when a completed lube cycle is fresh and no lube fault", text: "[XIC(Lube_Done),XIO(Lube_Cycle_Req)]XIO(Fault_Lube)OTE(Lube_OK);"}
          - {comment: "Lube cycle timer", text: "XIC(Lube_Cycle_Req)TON(T_LubeCycle,?,?);"}
          - {text: "XIC(T_LubeCycle.DN)OTE(Lube_Done);"}
      - name: R32_Recipe
        type: ST
        description: Recipe scaling -- derive pressure/dwell/tonnage setpoints from the selected recipe.
        lines:
          - "(* Select recipe parameters based on the HMI recipe number *)"
          - "IF Recipe_Number = 1 THEN"
          - "    Recipe.Pressure := 1800.0;"
          - "    Recipe.DwellTime := 500;"
          - "ELSIF Recipe_Number = 2 THEN"
          - "    Recipe.Pressure := 2200.0;"
          - "    Recipe.DwellTime := 750;"
          - "ELSE"
          - "    Recipe.Pressure := 1500.0;"
          - "    Recipe.DwellTime := 300;"
          - "END_IF;"
          - "Recipe.Number := Recipe_Number;"
          - "(* Scale target tonnage from pressure: tons = PSI * ram_area / 2000 *)"
          - "Recipe.Tonnage := Recipe.Pressure * 0.0075;"
          - "Hyd_Pressure_SP := Recipe.Pressure;"
          - "Press_Tonnage := Recipe.Tonnage;"

  # ---------------------------------------------------------------- P400_Outfeed
  - name: P400_Outfeed
    main_routine: MainRoutine
    routines:
      - name: MainRoutine
        type: RLL
        rungs:
          - {text: "JSR(R40_OutfeedConveyor,0);"}
          - {text: "JSR(R41_RejectGate,0);"}
      - name: R40_OutfeedConveyor
        type: RLL
        description: Outfeed conveyor motor starter and drive-fault latching.
        rungs:
          - {text: "XIC(System_Running)XIC(Mode_Auto)XIO(Fault_DriveFault)OTE(Outfeed_Start_Cmd);"}
          - {text: "XIC(Cycle_Stop_PB)OTE(Outfeed_Stop_Cmd);"}
          - {comment: "Outfeed conveyor starter AOI", text: "FB_MOTOR_STARTER(Motor_Outfeed,Outfeed_Start_Cmd,Outfeed_Stop_Cmd,Outfeed_Running,Outfeed_Run_Cmd,Motor_Outfeed_Fault);"}
          - {comment: "Latch drive fault", text: "[XIC(Drive_Fault_In),XIC(Motor_Outfeed_Fault)]OTL(Fault_DriveFault);"}
          - {comment: "Reset drive fault", text: "XIC(Reset_PB)XIO(Drive_Fault_In)OTU(Fault_DriveFault);"}
          - {text: "XIC(Drive_Ready)XIO(Fault_DriveFault)OTE(Outfeed_Ready);"}
      - name: R41_RejectGate
        type: RLL
        description: Reject diverter gate and production counters (CTU).
        rungs:
          - {comment: "Reject gate diverter AOI", text: "FB_CYLINDER(Cyl_RejectGate,Gate_Extend_Cmd,Gate_Retract_Cmd,Reject_Gate_Open,Reject_Gate_Home,Gate_Ext_Out,Gate_Ret_Out,Gate_Fault);"}
          - {comment: "Flag reject on a failed quality check", text: "XIC(Part_At_Outfeed)XIC(Quality_Fail)OTE(Part_Reject);"}
          - {comment: "Divert rejects, otherwise stay home", text: "XIC(Part_Reject)OTE(Gate_Extend_Cmd);"}
          - {text: "XIO(Part_Reject)OTE(Gate_Retract_Cmd);"}
          - {comment: "Count good parts leaving the outfeed", text: "XIC(Part_At_Outfeed)XIO(Part_Reject)ONS(Count_ONS)CTU(C_PartCount,?,?);"}
          - {comment: "Count rejects", text: "XIC(Part_At_Outfeed)XIC(Part_Reject)ONS(Reject_ONS)CTU(C_RejectCount,?,?);"}
          - {text: "MOV(C_PartCount.ACC,Good_Part_Total);"}
          - {comment: "Reset counters on shift reset", text: "XIC(Reset_PB)RES(C_PartCount);"}

  # ---------------------------------------------------------------- P900_Safety
  - name: P900_Safety
    main_routine: MainRoutine
    routines:
      - name: MainRoutine
        type: RLL
        rungs:
          - {text: "JSR(R90_EstopChain,0);"}
          - {text: "JSR(R91_GuardLightCurtain,0);"}
          - {comment: "R92 computes the master Safety_OK (money-shot source)", text: "JSR(R92_SafetyOK,0);"}
      - name: R90_EstopChain
        type: RLL
        description: Dual-channel E-stop chain evaluation and reset handshake.
        rungs:
          - {comment: "E-stop active if either channel is open", text: "[XIO(Estop_PB1),XIO(Estop_PB2)]OTE(Estop_Active);"}
          - {comment: "E-stop chain OK when both channels closed and relay confirms", text: "XIC(Estop_PB1)XIC(Estop_PB2)XIO(Estop_Active)OTE(Estop_Chain_OK);"}
          - {comment: "Reset handshake: reset PB while chain healthy and estop clear", text: "XIC(Safety_Reset_PB)XIC(Estop_Chain_OK)XIO(Estop_Active)ONS(Reset_ONS)OTE(Safety_Reset_Done);"}
      - name: R91_GuardLightCurtain
        type: RLL
        description: Guard door and light curtain supervision + latched safety faults.
        rungs:
          - {comment: "Guard opened during a cycle latches a fault", text: "XIO(GuardDoor_Closed)XIC(Cycle_Active)OTE(Guard_Open_Detected);"}
          - {text: "XIC(Guard_Open_Detected)OTL(Fault_GuardOpen);"}
          - {text: "XIC(Safety_Reset_PB)XIC(GuardDoor_Closed)OTU(Fault_GuardOpen);"}
          - {comment: "Light curtain broken during a cycle latches a fault", text: "XIO(LightCurtain_Clear)XIC(Cycle_Active)OTE(LightCurtain_Broken);"}
          - {text: "XIC(LightCurtain_Broken)OTL(Fault_LightCurtain);"}
          - {text: "XIC(Safety_Reset_PB)XIC(LightCurtain_Clear)OTU(Fault_LightCurtain);"}
