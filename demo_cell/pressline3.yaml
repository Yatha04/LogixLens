# =============================================================================
# PressLine_3 -- declarative cell specification (single source of truth)
# =============================================================================
# This file drives generate_l5x.py (emits PressLine_3.L5X) and is designed to
# ALSO drive a future asyncio simulator: device types, I/O points, and interlock
# conditions are expressed as data, never embedded XML.
#
# Cell layout (physical flow, left to right):
#   infeed conveyor -> transfer arm (pick/place) -> hydraulic press
#   (guard door + light curtain + dual-channel E-stop) -> outfeed conveyor
#   with reject gate.
#
# The "money-shot" diagnostic chain (must trace Press_Cycle_Start -> GuardDoor_Closed
# in <= 3 hops): see interlocks: Press_Cycle_Start and Safety_OK below.
# =============================================================================

controller:
  name: PressLine_3
  processor: 5069-L320ER
  major_rev: 33
  minor_rev: 11
  software_revision: "33.00"
  project_creation_date: "Mon Jan 06 08:14:22 2025"
  last_modified_date: "Wed Jul 01 16:52:10 2026"
  description: >-
    Station 3 hydraulic press cell. Infeed conveyor stages parts to a pick/place
    transfer arm that loads a guarded hydraulic press; good parts exit on the
    outfeed conveyor, rejects are diverted by a gate. Safety is dual-channel.

# -----------------------------------------------------------------------------
# Semantic model (consumed by the simulator; documentation-as-data for the L5X)
# -----------------------------------------------------------------------------
stations:
  - id: infeed
    program: P100_Infeed
    status_tag: Station_Infeed
    devices: [Motor_Infeed]
    sensors: [PartPresent_Eye1, PartPresent_Eye2, Infeed_Running]
  - id: transfer
    program: P200_Transfer
    status_tag: Station_Transfer
    devices: [Cyl_TransferArm]
    sensors: [TransferArm_Extended, TransferArm_Retracted, Vac_OK]
  - id: press
    program: P300_Press
    status_tag: Station_Press
    devices: [Valve_PressClamp, Valve_Lube, Cyl_PressRam]
    sensors: [Press_At_Top, Press_At_Bottom, Clamp_Closed_LS, Hyd_Pump_Running, Press_Overtemp]
  - id: outfeed
    program: P400_Outfeed
    status_tag: Station_Outfeed
    devices: [Motor_Outfeed, Cyl_RejectGate]
    sensors: [Part_At_Outfeed, Reject_Gate_Open, Drive_Ready]

# Fault registry -- each maps to a chaos-injection fault in the design doc (S4).
faults:
  - {tag: Fault_InfeedJam,       chaos: infeed_jam,      latch_in: Infeed_Jam_Detected}
  - {tag: Fault_TransferTimeout, chaos: eye_blocked,     latch_in: Transfer_Timeout}
  - {tag: Fault_PressOvertemp,   chaos: press_overtemp,  latch_in: Press_Overtemp}
  - {tag: Fault_HydLowPressure,  chaos: press_overtemp,  latch_in: Hyd_LowPressure}
  - {tag: Fault_GuardOpen,       chaos: guard_door_stuck, latch_in: Guard_Open_Detected}
  - {tag: Fault_LightCurtain,    chaos: eye_blocked,     latch_in: LightCurtain_Broken}
  - {tag: Fault_DriveFault,      chaos: drive_fault,     latch_in: Drive_Fault_In}

# =============================================================================
# UDTs
# =============================================================================
udts:
  # ALARM_TYPE MUST have exactly 7 members (parser integration test asserts this).
  - name: ALARM_TYPE
    description: Standard alarm/fault record used across all stations.
    members:
      - {name: Active,    data_type: BOOL, description: Alarm condition currently present}
      - {name: Acked,     data_type: BOOL, description: Operator has acknowledged}
      - {name: Latched,   data_type: BOOL, description: Alarm latched until reset}
      - {name: ResetReq,  data_type: BOOL, description: Reset requested}
      - {name: Code,      data_type: DINT, description: Numeric fault code}
      - {name: Severity,  data_type: SINT, description: 0=info 1=warn 2=fault 3=critical}
      - {name: Count,     data_type: DINT, description: Occurrence count since power-up}

  - name: udtStation
    description: Per-station status/handshake structure.
    members:
      - {name: Ready,       data_type: BOOL, description: Station ready to run}
      - {name: CycleActive, data_type: BOOL, description: Station cycle in progress}
      - {name: Fault,       data_type: BOOL, description: Station has an active fault}
      - {name: Home,        data_type: BOOL, description: Station actuators at home}
      - {name: Step,        data_type: DINT, description: Sequencer step register}
      - {name: CycleCount,  data_type: DINT, description: Completed cycles this shift}

  - name: udtRecipe
    description: Press recipe parameters selected from the HMI.
    members:
      - {name: Number,     data_type: DINT, description: Selected recipe number}
      - {name: Pressure,   data_type: REAL, description: Target hydraulic pressure (PSI)}
      - {name: DwellTime,  data_type: DINT, description: Bottom dwell time (ms)}
      - {name: Tonnage,    data_type: REAL, description: Target press tonnage}

